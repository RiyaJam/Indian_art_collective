<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artisan Login — Indian Art Collective</title>
<link rel="stylesheet" href="css/style.css">
<style>
  body { background: linear-gradient(135deg, #FDF6E8, #F5E0C0); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
  .auth-card { background: #fff; border-radius: var(--radius-lg); width: 100%; max-width: 480px; box-shadow: var(--shadow-lg); overflow: hidden; }
  .auth-header { background: linear-gradient(135deg, var(--saffron), var(--earth)); padding: 2.5rem; text-align: center; color: #fff; }
  .auth-header .logo { font-size: 3rem; margin-bottom: .75rem; }
  .auth-header h2 { color: #fff; margin-bottom: .3rem; }
  .auth-header p { color: rgba(255,255,255,.8); font-size: .88rem; }
  .auth-body { padding: 2rem; }
  .auth-tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 2rem; }
  .auth-tab { flex: 1; padding: .75rem; background: none; border: none; cursor: pointer; font-family: 'DM Sans',sans-serif; font-size: .9rem; font-weight: 500; color: var(--ink-60); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: var(--transition); }
  .auth-tab.active { color: var(--saffron); border-bottom-color: var(--saffron); }
  .role-links { display: flex; gap: .5rem; justify-content: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border); }
  .role-link { font-size: .8rem; color: var(--ink-60); display: flex; align-items: center; gap: .3rem; padding: .4rem .85rem; border-radius: 20px; border: 1px solid var(--border); transition: var(--transition); }
  .role-link:hover { background: var(--cream); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
</style>
</head>
<body>
<div class="auth-card">
  <div class="auth-header">
    <div class="logo">🎨</div>
    <h2>Artisan Portal</h2>
    <p>Manage your products, orders & exhibitions</p>
  </div>
  <div class="auth-body">
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login-tab">Login</button>
      <button class="auth-tab" data-tab="register-tab">Register</button>
    </div>

    <div id="login-tab" class="tab-pane">
      <div id="login-alert"></div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="login-email" class="form-control" placeholder="your@email.com">
        <span class="form-error">Valid email required</span>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="login-password" class="form-control" placeholder="Enter password">
        <span class="form-error">Password required</span>
      </div>
      <button class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:.5rem" id="login-btn" onclick="doLogin()">Login as Artisan</button>
      <p style="text-align:center;font-size:.8rem;color:var(--ink-60);margin-top:1rem">Demo: <strong>sunita@artisan.com</strong> / <strong>password123</strong></p>
    </div>

    <div id="register-tab" class="tab-pane" style="display:none">
      <div id="reg-alert"></div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <input type="text" id="reg-name" class="form-control" placeholder="Sunita Devi">
          <span class="form-error">Required</span>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="reg-email" class="form-control" placeholder="your@email.com">
          <span class="form-error">Required</span>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Date of Birth</label>
          <input type="date" id="reg-dob" class="form-control">
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input type="tel" id="reg-phone" class="form-control" placeholder="9876543210">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Years of Experience</label>
          <input type="number" id="reg-exp" class="form-control" placeholder="5" min="0">
        </div>
        <div class="form-group">
          <label class="form-label">Skill Level</label>
          <select id="reg-skill" class="form-control">
            <option>Beginner</option><option>Intermediate</option><option>Advanced</option><option>Master</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">State</label>
          <input type="text" id="reg-state" class="form-control" placeholder="Bihar">
        </div>
        <div class="form-group">
          <label class="form-label">Gender</label>
          <select id="reg-gender" class="form-control">
            <option>Male</option><option>Female</option><option>Other</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Address</label>
        <input type="text" id="reg-address" class="form-control" placeholder="Village, District, State">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="reg-password" class="form-control" placeholder="Min 6 characters">
        <span class="form-error">Min 6 characters</span>
      </div>
      <button class="btn btn-primary btn-lg" style="width:100%;justify-content:center" onclick="doRegister()">Create Artisan Account</button>
    </div>

    <div class="role-links">
      <a href="login_buyer.html" class="role-link">🛍️ Buyer Login</a>
      <a href="login_admin.html" class="role-link">⚙️ Admin Login</a>
      <a href="index.html" class="role-link">🏠 Home</a>
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script>
redirectIfLoggedIn();
document.querySelectorAll('.auth-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p => p.style.display = 'none');
    tab.classList.add('active');
    document.getElementById(tab.dataset.tab).style.display = 'block';
  });
});
if (window.location.hash === '#register') document.querySelectorAll('.auth-tab')[1].click();

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  let valid = true;
  if (!email.includes('@')) { document.getElementById('login-email').classList.add('error'); valid = false; } else document.getElementById('login-email').classList.remove('error');
  if (!password) { document.getElementById('login-password').classList.add('error'); valid = false; } else document.getElementById('login-password').classList.remove('error');
  if (!valid) return;
  const btn = document.getElementById('login-btn');
  btn.disabled = true; btn.textContent = 'Logging in…';
  try {
    const data = await api.loginArtisan({ email, password });
    saveAuth(data);
    showToast('Welcome, ' + data.name + '!', 'success');
    setTimeout(() => window.location.href = 'dashboard_artisan.html', 800);
  } catch(e) {
    document.getElementById('login-alert').innerHTML = `<div class="alert alert-error">❌ ${e.message}</div>`;
    btn.disabled = false; btn.textContent = 'Login as Artisan';
  }
}

async function doRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  let valid = true;
  if (!name) { document.getElementById('reg-name').classList.add('error'); valid = false; } else document.getElementById('reg-name').classList.remove('error');
  if (!email.includes('@')) { document.getElementById('reg-email').classList.add('error'); valid = false; } else document.getElementById('reg-email').classList.remove('error');
  if (password.length < 6) { document.getElementById('reg-password').classList.add('error'); valid = false; } else document.getElementById('reg-password').classList.remove('error');
  if (!valid) return;
  try {
    await api.registerArtisan({
      name, email, password,
      dob: document.getElementById('reg-dob').value,
      phone: document.getElementById('reg-phone').value,
      years_of_experience: document.getElementById('reg-exp').value,
      skill_level: document.getElementById('reg-skill').value,
      state: document.getElementById('reg-state').value,
      gender: document.getElementById('reg-gender').value,
      address: document.getElementById('reg-address').value,
    });
    showToast('Account created! Please login.', 'success');
    setTimeout(() => document.querySelectorAll('.auth-tab')[0].click(), 800);
  } catch(e) {
    document.getElementById('reg-alert').innerHTML = `<div class="alert alert-error">❌ ${e.message}</div>`;
  }
}
</script>
</body>
</html>
